name: Accessibility CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  accessibility:
    name: WCAG 2.1 AA Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: eduPlatformUser-main/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: eduPlatformUser-main
        run: pnpm install --frozen-lockfile

      - name: ESLint — jsx-a11y accessibility rules
        working-directory: eduPlatformUser-main/apps/web
        run: pnpm eslint app/ --quiet
        # --quiet reports only errors, skipping pre-existing unrelated warnings

      - name: jest-axe — WCAG 2.1 AA automated tests
        working-directory: eduPlatformUser-main/apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
        run: pnpm test:a11y
