  <rect x="268" y="272" width="68" height="6" rx="3" fill="#7C3AED" opacity="0.4"/>
  <!-- Pencil -->
  <g transform="rotate(-35, 256, 330)">
    <rect x="220" y="310" width="22" height="72" rx="3" fill="#FCD34D"/>
    <polygon points="220,382 242,382 231,406" fill="#F59E0B"/>
    <rect x="220" y="310" width="22" height="12" rx="3" fill="#9CA3AF"/>
