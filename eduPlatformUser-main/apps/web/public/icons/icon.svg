  <rect x="172" y="216" width="70" height="6" rx="3" fill="#7C3AED" opacity="0.4"/>
  <rect x="172" y="230" width="60" height="6" rx="3" fill="#7C3AED" opacity="0.4"/>
  <rect x="172" y="244" width="65" height="6" rx="3" fill="#7C3AED" opacity="0.4"/>
  <rect x="172" y="258" width="55" height="6" rx="3" fill="#7C3AED" opacity="0.4"/>
  <rect x="172" y="272" width="68" height="6" rx="3" fill="#7C3AED" opacity="0.4"/>
  <!-- Text lines (right page) -->
  <rect x="268" y="196" width="60" height="8" rx="4" fill="#7C3AED" opacity="0.7"/>
  <rect x="268" y="216" width="70" height="6" rx="3" fill="#7C3AED" opacity="0.4"/>
  <rect x="268" y="230" width="60" height="6" rx="3" fill="#7C3AED" opacity="0.4"/>
  <rect x="268" y="244" width="65" height="6" rx="3" fill="#7C3AED" opacity="0.4"/>
